<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bebedeck mark">
  <!-- Fanned deck of cards = "deck" + 도감(dex). Front orange card carries a check-smile = verified + happy. -->
  <!-- back-left: coral -->
  <g transform="rotate(-21 120 196)">
    <rect x="68" y="44" width="104" height="150" rx="24" fill="#FF3B5C" stroke="#FFFBF5" stroke-width="6"/>
  </g>
  <!-- back-right: azure -->
  <g transform="rotate(21 120 196)">
    <rect x="68" y="44" width="104" height="150" rx="24" fill="#2D7DFF" stroke="#FFFBF5" stroke-width="6"/>
  </g>
  <!-- inner-left: leaf -->
  <g transform="rotate(-8 120 196)">
    <rect x="68" y="44" width="104" height="150" rx="24" fill="#14C46A" stroke="#FFFBF5" stroke-width="6"/>
  </g>
  <!-- front: tangerine + face -->
  <g transform="rotate(8 120 196)">
    <rect x="68" y="44" width="104" height="150" rx="24" fill="#FF5A1F" stroke="#FFFBF5" stroke-width="6"/>
    <circle cx="104" cy="104" r="8" fill="#FFFBF5"/>
    <circle cx="136" cy="104" r="8" fill="#FFFBF5"/>
    <path d="M102 134 L116 150 L142 118" fill="none" stroke="#FFFBF5" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
