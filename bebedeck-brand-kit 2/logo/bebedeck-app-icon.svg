<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bebedeck app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6E1F"/>
      <stop offset="1" stop-color="#FF4A12"/>
    </linearGradient>
  </defs>
  <rect width="240" height="240" rx="54" fill="url(#bg)"/>
  <!-- peeking deck cards behind the front card -->
  <rect x="64" y="62" width="112" height="124" rx="24" fill="#14C46A" transform="translate(-22 -10) rotate(-12 120 124)" stroke="#FF5A1F" stroke-width="3"/>
  <rect x="64" y="62" width="112" height="124" rx="24" fill="#2D7DFF" transform="translate(22 -10) rotate(12 120 124)" stroke="#FF5A1F" stroke-width="3"/>
  <!-- front white card -->
  <rect x="62" y="64" width="116" height="122" rx="26" fill="#FFFBF5"/>
  <!-- category dots = deck of items -->
  <circle cx="100" cy="92" r="6" fill="#FF5A1F"/>
  <circle cx="120" cy="92" r="6" fill="#14C46A"/>
  <circle cx="140" cy="92" r="6" fill="#FF3B5C"/>
  <!-- check-smile face -->
  <circle cx="104" cy="128" r="7.5" fill="#211A14"/>
  <circle cx="136" cy="128" r="7.5" fill="#211A14"/>
  <path d="M100 152 L114 168 L142 138" fill="none" stroke="#FF5A1F" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
